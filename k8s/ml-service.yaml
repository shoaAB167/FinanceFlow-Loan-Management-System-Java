apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: loan-app
  labels:
    app: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: 539296090216.dkr.ecr.us-east-2.amazonaws.com/ml-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          # Resource limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          # Health check
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: loan-app
  labels:
    app: ml-service
spec:
  selector:
    app: ml-service
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
